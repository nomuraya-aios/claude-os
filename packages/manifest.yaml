# claude-os packages manifest
# name: パッケージ名（aios install <name> で指定する名前）
# version: semver
# description: 説明
# install_dest: インストール先（~/.claude/skills/<name> 等）
# source_dir: このリポジトリ内のソースディレクトリ（相対パス）
# trigger: CLAUDE.md に注入するスキルトリガー行
# deps: 依存コマンド一覧

packages:
  - name: ocr
    version: "1.0.0"
    description: "NDLOCR-Lite を使った日本語OCRスキル"
    install_dest: "~/.claude/skills/ocr"
    source_dir: "packages/skills/ocr"
    trigger: "`ocr`: OCR/文字認識/画像からテキスト/スキャン"
    deps:
      - ndlocr-lite
      - uv

  - name: pdf
    version: "1.0.0"
    description: "PDFファイルの読み取り・要約"
    install_dest: "~/.claude/skills/pdf"
    source_dir: "packages/skills/pdf"
    trigger: "`pdf`: PDF読んで/PDFを開いて"
    deps: []

  - name: tts
    version: "1.0.0"
    description: "テキスト音声読み上げ (macOS say コマンド使用)"
    install_dest: "~/.claude/skills/tts"
    source_dir: "packages/skills/tts"
    trigger: "`tts`: 音声読み上げ/TTS/読んで/しゃべって/speak"
    deps: []

  - name: transcribe-diarize
    version: "1.0.0"
    description: "音声文字起こし・話者分離"
    install_dest: "~/.claude/skills/transcribe-diarize"
    source_dir: "packages/skills/transcribe-diarize"
    trigger: "`transcribe-diarize`: 文字起こし/音声/ミーティング録音"
    deps:
      - uv

  - name: github-issue
    version: "1.0.0"
    description: "GitHub Issue作成スキル"
    install_dest: "~/.claude/skills/github-issue"
    source_dir: "packages/skills/github-issue"
    trigger: "`github-issue`: Issue作成/Issueを作って"
    deps:
      - gh

  - name: article
    version: "1.0.0"
    description: "記事執筆・ブログ投稿スキル"
    install_dest: "~/.claude/skills/article"
    source_dir: "packages/skills/article"
    trigger: "`article`: 記事/執筆/ブログ書いて"
    deps: []

  - name: web-fetch
    version: "1.0.0"
    description: "URLのコンテンツ取得・要約"
    install_dest: "~/.claude/skills/web-fetch"
    source_dir: "packages/skills/web-fetch"
    trigger: "`web-fetch`: URL取得/URLを読んで"
    deps: []

  - name: pptx
    version: "1.0.0"
    description: "PowerPointファイル作成"
    install_dest: "~/.claude/skills/pptx"
    source_dir: "packages/skills/pptx"
    trigger: "`pptx`: PowerPoint/スライド作成"
    deps:
      - uv

  - name: use-knowledge
    version: "1.0.0"
    description: "保存済みナレッジを参照"
    install_dest: "~/.claude/skills/use-knowledge"
    source_dir: "packages/skills/use-knowledge"
    trigger: "`use-knowledge`: ナレッジ参照/過去に調べた"
    deps: []
